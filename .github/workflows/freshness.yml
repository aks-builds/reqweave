name: freshness

# Drift guard: the IR version string stays in sync between the TS core and the
# .NET analyzer (they speak the same contract). Lockfile<->package.json sync is
# already enforced by `npm ci` in CI, so it's not re-checked here (regenerating
# the lockfile cross-platform churns optional-dep libc/os fields and gives false
# failures).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: IR version parity (TS core vs .NET analyzer)
        run: |
          set -euo pipefail
          TS=$(grep -oE 'IR_VERSION = "[0-9]+\.[0-9]+\.[0-9]+"' src/ir/schema.ts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          NET=$(grep -oE 'IrVersion = "[0-9]+\.[0-9]+\.[0-9]+"' analyzer/src/Reqweave.Analyzer/Program.cs | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          echo "TS=$TS  .NET=$NET"
          if [ -z "$TS" ] || [ "$TS" != "$NET" ]; then
            echo "::error::IR version mismatch between TS ($TS) and .NET ($NET)"
            exit 1
          fi
