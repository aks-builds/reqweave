name: freshness

# Drift guards that aren't about pass/fail tests:
#   1. The IR version string stays in sync between the TS core and the .NET
#      analyzer (they speak the same contract).
#   2. package-lock.json is in sync with package.json.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: IR version parity (TS core vs .NET analyzer)
        run: |
          set -euo pipefail
          TS=$(grep -oE 'IR_VERSION = "[0-9]+\.[0-9]+\.[0-9]+"' src/index.ts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          NET=$(grep -oE 'IrVersion = "[0-9]+\.[0-9]+\.[0-9]+"' analyzer/src/Reqweave.Analyzer/Program.cs | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || true)
          echo "TS=$TS  .NET=$NET"
          if [ -z "$TS" ] || [ "$TS" != "$NET" ]; then
            echo "::error::IR version mismatch between TS ($TS) and .NET ($NET)"
            exit 1
          fi

      - name: Lockfile is in sync with package.json
        run: |
          set -euo pipefail
          npm install --package-lock-only --no-audit --no-fund
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is stale — run 'npm install' and commit the result"
            exit 1
          fi
