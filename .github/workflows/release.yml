name: release

# Manually-dispatched release-prep. Bumps the version, syncs it into the npm
# package.json and (when present) the Claude-marketplace manifests, rolls
# CHANGELOG.md, opens a release/* PR, and enables auto-merge. Once CI (the
# required `test` check) passes and the PR is approved, it merges and the
# published GitHub release triggers publish.yml.
#
# Required repo secrets:
#   - NPM_TOKEN       (consumed by publish.yml) — npm automation token.
#   - APPROVER_PAT  — a user PAT (repo scope). GITHUB_TOKEN cannot open the PR
#                       here: PRs it opens do NOT trigger downstream workflows,
#                       so the required `test` check would never run.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        type: choice
        default: patch
        options: [prerelease, patch, minor, major]
      preid:
        description: "Prerelease id (when bump = prerelease)"
        required: false
        default: alpha

permissions:
  contents: write
  pull-requests: write

jobs:
  open-release-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.APPROVER_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure git identity
        run: |
          git config --global user.name "aks-builds"
          git config --global user.email "its.aks@outlook.com"

      - name: Test (Node + .NET)
        run: |
          npm ci
          npm run build
          npm test
          dotnet test analyzer/test/Reqweave.Analyzer.Tests/Reqweave.Analyzer.Tests.csproj -v minimal

      - name: Bump version (no tag)
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ inputs.bump }}" = "prerelease" ]; then
            RAW=$(npm version prerelease --preid "${{ inputs.preid }}" --no-git-tag-version)
          else
            RAW=$(npm version "${{ inputs.bump }}" --no-git-tag-version)
          fi
          VERSION="${RAW#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=release/v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Sync version into Claude-marketplace manifests (if present)
        shell: bash
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const v = '${{ steps.bump.outputs.version }}';
            for (const p of ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json']) {
              if (!fs.existsSync(p)) continue;
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              if ('version' in j) j.version = v;
              if (j.metadata && 'version' in j.metadata) j.metadata.version = v;
              if (Array.isArray(j.plugins)) j.plugins.forEach(pl => { if ('version' in pl) pl.version = v; });
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - name: Roll CHANGELOG [Unreleased] -> [VERSION] - DATE
        shell: bash
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const v = '${{ steps.bump.outputs.version }}';
            const d = new Date().toISOString().slice(0, 10);
            const p = 'CHANGELOG.md';
            const c = fs.readFileSync(p, 'utf8');
            const next = c.replace('## [Unreleased]', '## [Unreleased]\n\n## [' + v + '] - ' + d);
            if (next !== c) fs.writeFileSync(p, next);
          "

      - name: Extract release notes
        shell: bash
        run: |
          set -euo pipefail
          awk -v ver="${{ steps.bump.outputs.version }}" '
            $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          [ -s release-notes.md ] || echo "Release ${{ steps.bump.outputs.version }}." > release-notes.md

      - name: Push release branch
        run: |
          set -euo pipefail
          git checkout -b "${{ steps.bump.outputs.branch }}"
          git add package.json package-lock.json CHANGELOG.md
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json 2>/dev/null || true
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.branch }}"

      - name: Open PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.APPROVER_PAT }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create --base main --head "${{ steps.bump.outputs.branch }}" \
            --title "chore(release): ${{ steps.bump.outputs.version }}" \
            --body-file release-notes.md)
          echo "Opened $PR_URL"
          gh pr merge "$PR_URL" --auto --squash
