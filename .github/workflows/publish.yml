name: publish

# Ships the npm package when a GitHub release is published (release.yml opens the
# release PR; merging it and publishing the release triggers this).
#
# Required repo secret: NPM_TOKEN (npm automation token).

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
