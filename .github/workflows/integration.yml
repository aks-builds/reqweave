name: integration

# Real end-to-end: a fixture ASP.NET Core API -> the .NET analyzer -> reqweave
# CLI -> importable collections for all tools, validated structurally. Also
# proves byte-stable (deterministic) output across runs. This is the only job
# that exercises the real analyzer (dotnet) + CLI together.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    env:
      FIXTURE: tests/fixtures/dotnet/PetApi
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Generate collections from the fixture API (real analyzer)
        run: |
          node bin/cli.js generate "$FIXTURE" --out out --tools all --depth standard \
            --service PetApi --generated-at 2026-01-01T00:00:00Z

      - name: Validate all tool outputs
        run: node tests/integration/validate-outputs.mjs out

      - name: Output is deterministic (byte-stable across runs)
        run: |
          node bin/cli.js generate "$FIXTURE" --out out2 --tools all --depth standard \
            --service PetApi --generated-at 2026-01-01T00:00:00Z
          if ! diff -r out out2 >/dev/null; then
            echo "::error::reqweave output is not deterministic"; diff -r out out2 || true; exit 1
          fi
          echo "deterministic: out == out2"
